# Example .p-ralph.yaml — code-base task list, pytest as verify.
# One task per feature/refactor; each worker branch must leave tests green.

loop_id: refactor
tag_suffix: -baseline
branch_prefix: "refactor/task"

plan_file:     "refactor_plan.md"
activity_file: "refactor_activity.md"

# Nothing written to the working tree by pytest, so no artifacts.
build_artifacts: []

max_parallel: 4
worktree_dir: ".pralph-worktrees"

claude:
  binary: claude
  model: claude-opus-4-6
  extra_flags:
    - --dangerously-skip-permissions
  resolver_allowed_tools: "Read,Edit,Write,Bash(pytest:*),Bash(git add:*),Bash(git commit:*),Bash(git status),Bash(git diff:*),Bash(ls:*),Glob,Grep"

verify_cmd: "pytest -x --no-header -q"
integrate_verify_cmd: "pytest --no-header -q"

prompt_template: "refactor_PROMPT.md"
