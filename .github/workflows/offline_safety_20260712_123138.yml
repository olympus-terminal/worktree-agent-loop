name: P0 offline integration

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  offline-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate shell and Python syntax
        run: |
          bash -n bin/p-ralph install.sh lib/install_merge_drivers.sh lib/resolve_with_claude.sh templates/loop.sh.tmpl tests/integration_p0_20260712_094221.sh
          python3 - <<'PY'
          from pathlib import Path

          for path in sorted(Path("lib/merge_drivers").glob("*.py")):
              compile(path.read_text(encoding="utf-8"), str(path), "exec")
              print(f"syntax OK: {path}")
          PY

      - name: Run offline integration suite
        run: bash tests/integration_p0_20260712_094221.sh
